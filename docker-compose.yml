services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cobalt-multi-agent-backend
    # Remove the ports section to not expose to host
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/conf.yaml.example:/app/conf.yaml:ro
    restart: unless-stopped
    networks:
      - cobalt-multi-agent-network

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
    container_name: cobalt-multi-agent-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cobalt-multi-agent-network

networks:
  cobalt-multi-agent-network:
    driver: bridge
